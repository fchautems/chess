<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Prévisualisation — Profil joueur</title>
</head>
<body>
  <p style="font-family:system-ui;padding:20px">Chargement de la prévisualisation…</p>
  <script>
    fetch("../../index.html", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then((html) => {
        const profileScript = '  <script src="js/09-profile.js"></' + 'script>\n';
        html = html
          .replaceAll('href="css/', 'href="../../css/')
          .replaceAll('src="js/', 'src="../../js/')
          .replace('</head>', '  <link rel="stylesheet" href="css/06-profile.css">\n</head>')
          .replace('</body>', profileScript + '</body>');
        document.open();
        document.write(html);
        document.close();
      })
      .catch((error) => {
        document.body.innerHTML = `<p style="font-family:system-ui;padding:20px;color:#b00020">Impossible de charger la prévisualisation : ${error.message}</p>`;
      });
  </script>
</body>
</html>
