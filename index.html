<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#262421">
  <title>Ouvertures — Entraîneur</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="errorBanner" class="error-banner"></div>

    <section id="home" class="screen active">
      <div class="top">
        <div class="brand">
          <span class="brand-icon">♞</span>
          <div>
            <b>Ouvertures</b>
            <div class="small">Comprendre, reconnaître, maîtriser.</div>
          </div>
        </div>
        <div class="xp">
          <div><span id="lvl">Niv. 1</span> · <span id="xpTxt">0 XP</span></div>
          <div class="bar"><div id="xpFill" class="fill"></div></div>
        </div>
      </div>

      <div class="card grid">
        <div class="two grid">
          <div>
            <label for="color">Couleur</label>
            <select id="color">
              <option value="white">Les Blancs</option>
              <option value="black">Les Noirs</option>
            </select>
          </div>
          <div>
            <label for="opening">Ouverture</label>
            <select id="opening"></select>
          </div>
        </div>

        <div>
          <label for="level">Niveau</label>
          <select id="level"></select>
        </div>

        <div id="preview" class="preview"></div>
        <div class="actions">
          <button id="conceptBtn" class="secondary">📘 Comprendre l’ouverture</button>
          <button id="startBtn" class="primary">Commencer</button>
          <button id="bossBtn" class="boss" hidden>👑 Boss final</button>
        </div>
      </div>
      <div class="home-tip small">La progression est enregistrée dans ce navigateur.</div>
    </section>

    <section id="train" class="screen">
      <div class="train-head">
        <button id="back" class="secondary compact-button" aria-label="Retour">←</button>
        <div class="train-title">
          <h2 id="title">Ouverture</h2>
          <div id="variant" class="small"></div>
        </div>
        <div class="chips">
          <span id="combo" class="chip">🔥 0</span>
          <span id="lives" class="chip" hidden>❤️ 3</span>
        </div>
      </div>

      <div id="board" class="board" aria-label="Échiquier"></div>
      <div class="progress"><div id="prog"></div></div>
      <div id="status" class="status">
        <strong>À toi de jouer</strong>
        <span>Trouve le prochain coup.</span>
      </div>
      <div class="toolbar">
        <button id="restart" class="secondary">Recommencer</button>
        <button id="hint" class="secondary">Indice</button>
        <button id="conceptTrain" class="secondary">Concept</button>
      </div>
    </section>
  </div>

  <div id="conceptModal" class="modal">
    <div class="modal-box concept">
      <h3 id="conceptTitle"></h3>
      <div id="conceptBody"></div>
      <div class="actions"><button id="conceptClose" class="primary">Fermer</button></div>
    </div>
  </div>

  <div id="resultModal" class="modal">
    <div class="modal-box result">
      <div id="emoji" class="big">🎉</div>
      <h3 id="resTitle">Session terminée</h3>
      <p id="resSub" class="small"></p>
      <div class="stats">
        <div class="stat"><b id="acc">0%</b><span class="small">précision</span></div>
        <div class="stat"><b id="err">0</b><span class="small">erreurs</span></div>
        <div class="stat"><b id="hints">0</b><span class="small">indices</span></div>
        <div class="stat"><b id="gain">+0 XP</b><span class="small">récompense</span></div>
      </div>
      <div class="actions">
        <button id="again" class="primary">Rejouer</button>
        <button id="homeBtn" class="secondary">Retour</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="app-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
