<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ouvertures тАФ Entra├оneur</title>
<style>
:root{--bg:#262421;--panel:#312e2b;--panel2:#3b3835;--txt:#f4f1ea;--muted:#aaa49b;--green:#81b64c;--blue:#55b1ff;--warn:#e0aa45;--bad:#d96758;--light:#eed6ad;--dark:#b6784f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:760px;margin:auto;min-height:100dvh;padding:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:10px}.brand b{font-size:28px}.xp{font-size:12px;color:var(--muted);text-align:right}.bar{width:140px;height:7px;border-radius:99px;background:#171614;overflow:hidden}.fill{height:100%;background:var(--green)}.card{background:var(--panel);border:1px solid #ffffff0d;border-radius:16px;padding:16px;box-shadow:0 12px 30px #0005}.grid{display:grid;gap:12px}.two{grid-template-columns:1fr 1fr}label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}select,button{font:inherit}select{width:100%;min-height:46px;background:#22201e;color:var(--txt);border:1px solid #ffffff14;border-radius:10px;padding:0 12px}.primary,.secondary,.boss{min-height:50px;border:0;border-radius:11px;font-weight:850;cursor:pointer}.primary{background:var(--green);color:#17210f}.secondary{background:var(--panel2);color:var(--txt)}.boss{background:linear-gradient(135deg,#76571c,#c69437);color:#fff5d5}.preview{margin-top:12px;padding:13px;border-left:3px solid var(--blue);background:#272522;border-radius:10px;color:#d4cec5;font-size:13px;line-height:1.45}.preview strong{display:block;color:white;font-size:15px;margin-bottom:5px}.actions{display:grid;gap:9px;margin-top:12px}.home-tip{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}.screen{display:none}.screen.active{display:block}.train-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.train-head h2{font-size:18px;margin:0}.chips{display:flex;gap:6px}.chip{background:var(--panel2);padding:6px 9px;border-radius:99px;font-size:12px;font-weight:800}.board{display:grid;grid-template-columns:repeat(8,1fr);aspect-ratio:1;margin:auto;max-width:100%;box-shadow:0 10px 28px #0006}.sq{position:relative;display:grid;place-items:center;font-size:clamp(28px,10vw,66px);line-height:1;user-select:none;cursor:pointer}.light{background:var(--light)}.dark{background:var(--dark)}.sq.sel:after,.sq.last:after,.sq.hint:after{content:"";position:absolute;inset:0;pointer-events:none}.sq.sel:after{background:#ffe36e80}.sq.last:after{background:#c9c04055}.sq.hint:after{background:#55b1ff70}.piece{position:relative;z-index:2;filter:drop-shadow(0 1px 1px #0005)}.status{margin:10px 0;padding:12px;border-left:4px solid #777;background:var(--panel);border-radius:12px;min-height:66px}.status.good{border-color:var(--green)}.status.alt{border-color:var(--blue)}.status.bad{border-color:var(--bad)}.status.warn{border-color:var(--warn)}.status strong{display:block;margin-bottom:3px}.status span{color:var(--muted);font-size:13px;line-height:1.4}.toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.progress{height:7px;background:#171614;border-radius:99px;overflow:hidden;margin:10px 0}.progress div{height:100%;background:var(--green)}.modal{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;padding:20px;z-index:30}.modal.open{display:flex}.modal-box{width:min(100%,520px);max-height:88dvh;overflow:auto;background:var(--panel);border-radius:18px;padding:20px}.modal-box h3{margin-top:0}.concept h4{margin:14px 0 6px}.concept p,.concept li{color:#cbc5bc;font-size:13px;line-height:1.5}.legend{display:grid;gap:7px;margin:12px 0}.legend div{padding:9px 10px;border-radius:9px;background:#252320;font-size:12px}.result{text-align:center}.result .big{font-size:42px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.stat{background:#252320;border-radius:10px;padding:11px}.stat b{display:block;font-size:20px}.small{font-size:12px;color:var(--muted)}@media(max-width:520px){.two{grid-template-columns:1fr}.app{padding:10px}.bar{width:100px}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active">
<div class="top"><div class="brand"><span style="font-size:42px;color:var(--green)">тЩЮ</span><div><b>Ouvertures</b><div class="small">Comprendre, reconna├оtre, ma├оtriser.</div></div></div><div class="xp"><div><span id="lvl">Niv. 1</span> ┬╖ <span id="xpTxt">0 XP</span></div><div class="bar"><div id="xpFill" class="fill" style="width:0%"></div></div></div></div>
<div class="card grid">
<div class="two grid"><div><label>Couleur</label><select id="color"><option value="white">Les Blancs</option><option value="black">Les Noirs</option></select></div><div><label>Ouverture</label><select id="opening"></select></div></div>
<div><label>Niveau</label><select id="level"></select></div>
<div id="preview" class="preview"></div>
<div class="actions"><button id="conceptBtn" class="secondary">ЁЯУШ Comprendre lтАЩouverture</button><button id="startBtn" class="primary">Commencer</button><button id="bossBtn" class="boss" hidden>ЁЯСС Boss final</button></div>
</div><div class="home-tip">La progression est enregistr├йe dans ce navigateur.</div>
</section>
<section id="train" class="screen">
<div class="train-head"><button id="back" class="secondary" style="min-height:40px;padding:0 12px">тЖР</button><div><h2 id="title">Ouverture</h2><div id="variant" class="small"></div></div><div class="chips"><span id="combo" class="chip">ЁЯФе 0</span><span id="lives" class="chip" hidden>тЭдя╕П 3</span></div></div>
<div id="board" class="board"></div><div class="progress"><div id="prog"></div></div>
<div id="status" class="status"><strong>├А toi de jouer</strong><span>Trouve le prochain coup.</span></div>
<div class="toolbar"><button id="restart" class="secondary">Recommencer</button><button id="hint" class="secondary">Indice</button><button id="conceptTrain" class="secondary">Concept</button></div>
</section>
</div>
<div id="conceptModal" class="modal"><div class="modal-box concept"><h3 id="conceptTitle"></h3><div id="conceptBody"></div><div class="actions"><button id="conceptClose" class="primary">Fermer</button></div></div></div>
<div id="resultModal" class="modal"><div class="modal-box result"><div id="emoji" class="big">ЁЯОЙ</div><h3 id="resTitle">Session termin├йe</h3><p id="resSub" class="small"></p><div class="stats"><div class="stat"><b id="acc">0%</b><span class="small">pr├йcision</span></div><div class="stat"><b id="err">0</b><span class="small">erreurs</span></div><div class="stat"><b id="hints">0</b><span class="small">indices</span></div><div class="stat"><b id="gain">+0 XP</b><span class="small">r├йcompense</span></div></div><div class="actions"><button id="again" class="primary">Rejouer</button><button id="homeBtn" class="secondary">Retour</button></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
'use strict';
const U={w:{k:'тЩФ',q:'тЩХ',r:'тЩЦ',b:'тЩЧ',n:'тЩШ',p:'тЩЩ'},b:{k:'тЩЪ',q:'тЩЫ',r:'тЩЬ',b:'тЩЭ',n:'тЩЮ',p:'тЩЯ'}};
const DATA={
white:[{id:'italian',name:'Partie italienne',desc:'D├йveloppement rapide, pression sur f7 et pr├йparation de d4.',principles:['D├йvelopper vite les pi├иces l├йg├иres','Roquer avant dтАЩouvrir compl├иtement le centre','Pr├йparer d4 avec c3 quand la position le permet','Utiliser la pression sur f7 comme contrainte, pas comme attaque forc├йe'],signals:[['...Fc5','Jeu sym├йtrique : pr├йpare c3 puis d4.'],['...Cf6','Les Noirs attaquent e4 : prot├иge le centre et surveille les tactiques.'],['...Fe7','D├йveloppement solide : profite de ton avance dтАЩespace.'],['...d6','Centre ferm├й : construis calmement avant la rupture d4.']],branches:[
{name:'Giuoco Piano',moves:['e4','e5','Nf3','Nc6','Bc4','Bc5','c3','Nf6','d4','exd4','cxd4','Bb4+','Bd2','Bxd2+','Nbxd2','d5','exd5','Nxd5','O-O','O-O']},
{name:'Deux Cavaliers',moves:['e4','e5','Nf3','Nc6','Bc4','Nf6','d3','Bc5','O-O','d6','c3','O-O','Re1','a6']},
{name:'D├йfense hongroise',moves:['e4','e5','Nf3','Nc6','Bc4','Be7','d4','d6','O-O','Nf6','Re1','O-O']},
{name:'Structure ...d6',moves:['e4','e5','Nf3','Nc6','Bc4','d6','d4','exd4','Nxd4','Nf6','Nc3','Be7','O-O','O-O']}
],alts:{'e4 e5 Nf3 Nc6 Bc4 Bc5':'O-O|d3','e4 e5 Nf3 Nc6 Bc4 Nf6':'Ng5','e4 e5 Nf3 Nc6':'Bb5'}} ,
{id:'london',name:'Syst├иme de Londres',desc:'Structure robuste avec Ff4, e3, Cf3 et c3.',principles:['Construire une structure stable','D├йvelopper le fou avant e3','Choisir le bon moment pour c4 ou e4'],signals:[['...d5','Structure classique : Ff4 puis e3.']],branches:[{name:'Londres classique',moves:['d4','d5','Nf3','Nf6','Bf4','e6','e3','Bd6','Bg3','O-O','Bd3','c5','c3','Nc6','Nbd2']}],alts:{}}
],
black:[{id:'caro',name:'Caro-Kann',desc:'D├йfense solide contre e4 avec ...c6 et ...d5.',principles:['Contester le centre sans bloquer le fou c8','Accepter un l├йger manque dтАЩespace au d├йbut','Viser une structure saine en finale'],signals:[['e4','Pr├йpare ...c6 puis ...d5.'],['e5','D├йveloppe le fou avant ...e6.']],branches:[{name:'Variante dтАЩavance',moves:['e4','c6','d4','d5','e5','Bf5','Nf3','e6','Be2','c5','O-O','Nc6']}],alts:{}} ,
{id:'french',name:'D├йfense fran├зaise',desc:'Centre solide avec ...e6 et ...d5.',principles:['Attaquer la cha├оne de pions par sa base','Accepter un fou c8 parfois passif','Cr├йer du contre-jeu ├а lтАЩaile dame'],signals:[['e4','R├йponds ...e6 pour pr├йparer ...d5.']],branches:[{name:'Classique',moves:['e4','e6','d4','d5','Nc3','Nf6','e5','Nfd7','f4','c5','Nf3','Nc6']}],alts:{}}
]};
const $=id=>document.getElementById(id);let profile=JSON.parse(localStorage.getItem('chessProfile')||'{"xp":0,"mastery":{}}');let color='white',opening=null,level=1,game=null,line=[],idx=0,sel=null,last=null,errors=0,hints=0,first=0,total=0,combo=0,boss=false,lives=3,queue=[],qIndex=0,current=null;
function save(){localStorage.setItem('chessProfile',JSON.stringify(profile));updateXP()}function updateXP(){const lv=Math.floor(profile.xp/500)+1,base=(lv-1)*500;$('lvl').textContent='Niv. '+lv;$('xpTxt').textContent=profile.xp+' XP';$('xpFill').style.width=Math.min(100,(profile.xp-base)/500*100)+'%'}
function openings(){return DATA[color]}function mastery(){return profile.mastery[opening.id]||0}function populate(){color=$('color').value;$('opening').innerHTML=openings().map(o=>`<option value="${o.id}">${o.name}</option>`).join('');opening=openings()[0];populateLevels();preview()}function populateLevels(){const m=mastery();$('level').innerHTML=[1,2,3].map(n=>`<option value="${n}" ${n>m+1?'disabled':''}>Niveau ${n}${n===1?' тАФ Apprendre':n===2?' тАФ Variantes':' тАФ Positions'}</option>`).join('');level=Math.min(Math.max(1,m+1),3);$('level').value=level;$('bossBtn').hidden=m<3||opening.id!=='italian'}
function preview(){const m=mastery();$('preview').innerHTML=`<strong>${opening.name}</strong>${opening.desc}<br><br><b>Concept :</b> ${opening.principles[0]}<br><b>Progression :</b> niveau ${m}/3 ma├оtris├й.`}
function show(id){$('home').classList.remove('active');$('train').classList.remove('active');$(id).classList.add('active')}
function concept(){ $('conceptTitle').textContent=opening.name;$('conceptBody').innerHTML=`<h4>Ce que cherche lтАЩouverture</h4><ul>${opening.principles.map(x=>`<li>${x}</li>`).join('')}</ul><h4>Lire les r├йponses adverses</h4>${opening.signals.map(([m,t])=>`<div class="legend"><div><b>${m}</b> тАФ ${t}</div></div>`).join('')}<h4>Comment lтАЩapplication juge tes coups</h4><div class="legend"><div style="border-left:4px solid var(--green)"><b>Coup du r├йpertoire</b> : la r├йponse pr├йcise que tu as choisi dтАЩapprendre.</div><div style="border-left:4px solid var(--blue)"><b>Bon coup alternatif</b> : valide, mais il m├иne vers un autre plan.</div><div style="border-left:4px solid var(--warn)"><b>Coup non valid├й</b> : l├йgal, mais pas ├йvalu├й comme mauvais sans moteur.</div></div>`;$('conceptModal').classList.add('open')}
function userColor(){return color==='white'?'w':'b'}function prep(moves){const g=new Chess();return moves.map(s=>{const m=g.move(s,{sloppy:true});return {...m}})}
function start(isBoss=false){boss=isBoss;lives=3;errors=hints=first=total=combo=0;sel=null;last=null;if(level===3||boss){queue=[];const branches=opening.branches;for(let b=0;b<branches.length;b++){const p=prep(branches[b].moves);for(let i=0;i<p.length;i++)if(p[i].color===userColor()&&i>=4)queue.push({branch:b,ply:i});}queue.sort(()=>Math.random()-.5);queue=queue.slice(0,boss?12:10);qIndex=0;loadQuiz()}else{const branch=level===1?opening.branches[0]:opening.branches[(Number(localStorage.getItem('rot_'+opening.id)||0))%opening.branches.length];if(level===2)localStorage.setItem('rot_'+opening.id,String((Number(localStorage.getItem('rot_'+opening.id)||0)+1)%opening.branches.length));line=prep(branch.moves);idx=0;game=new Chess();$('variant').textContent=branch.name;show('train');auto();render();status('├А toi de jouer','Trouve le prochain coup.','')}$('title').textContent=opening.name;$('lives').hidden=!boss;$('lives').textContent='тЭдя╕П '+lives;$('hint').disabled=boss}
function loadQuiz(){if(qIndex>=queue.length)return finish();current=queue[qIndex];const b=opening.branches[current.branch],p=prep(b.moves);game=new Chess();for(let i=0;i<current.ply;i++)game.move(p[i]);line=p;idx=current.ply;last=idx?line[idx-1]:null;show('train');$('variant').textContent=boss?'Boss тАФ variante cach├йe':'Position '+(qIndex+1)+' / '+queue.length;render();status('├А toi de jouer','Reconnais la position et trouve le coup du r├йpertoire.','')}
function auto(){while(idx<line.length&&line[idx].color!==userColor()){game.move(line[idx]);last=line[idx];idx++}if(idx>=line.length)finish()}
function squareOrder(){const files='abcdefgh',ranks='87654321';return ranks.flatMap(r=>[...files].map(f=>f+r))}function render(){const order=squareOrder();$('board').innerHTML='';for(const s of order){const f=s.charCodeAt(0)-97,r=8-Number(s[1]),d=document.createElement('div');d.className='sq '+((f+r)%2?'dark':'light')+(sel===s?' sel':'')+((last&&(last.from===s||last.to===s))?' last':'');d.dataset.s=s;const p=game.get(s);if(p)d.innerHTML=`<span class="piece">${U[p.color][p.type]}</span>`;d.onclick=()=>click(s);$('board').appendChild(d)}const done=(level===3||boss)?qIndex:Math.floor(idx/2);const max=(level===3||boss)?queue.length:Math.ceil(line.length/2);$('prog').style.width=(max?done/max*100:0)+'%';$('combo').textContent='ЁЯФе '+combo}
function click(s){const p=game.get(s);if(!sel){if(p&&p.color===userColor()&&game.turn()===userColor()){sel=s;render()}return}const move=game.move({from:sel,to:s,promotion:'q'});if(!move){sel=null;render();return}const expected=line[idx],path=game.history().slice(0,-1).concat(move.san).join(' '),alts=(opening.alts[game.history().slice(0,-1).join(' ')]||'').split('|').filter(Boolean);total++;if(move.from===expected.from&&move.to===expected.to){first++;combo++;last=move;idx++;status('Coup du r├йpertoire',explain(expected.san),'good');sel=null;render();setTimeout(()=>{if(level===3||boss){qIndex++;loadQuiz()}else{auto();render()}},450)}else{game.undo();errors++;combo=0;sel=null;if(alts.includes(move.san)){status('Bon coup alternatif',`${move.san} est jouable, mais m├иne vers un autre plan. Rejoue le coup du r├йpertoire.`,'alt')}else{if(boss){lives--; $('lives').textContent='тЭдя╕П '+Math.max(0,lives);if(lives<=0){render();return setTimeout(finish,350)}}status('Coup l├йgal non valid├й',`Ce coup nтАЩappartient pas au r├йpertoire ├йtudi├й. Cela ne signifie pas forc├йment quтАЩil est mauvais.`,'warn')}render()}}
function explain(san){const map={e4:'Occupe le centre et lib├иre le fou et la dame.',Nf3:'D├йveloppe une pi├иce en attaquant le centre.',Bc4:'D├йveloppe le fou vers f7, point sensible.',c3:'Pr├йpare la pouss├йe d4.',d4:'Ouvre le centre quand tes pi├иces sont pr├кtes.','O-O':'Mets ton roi en s├йcurit├й et active la tour.'};return map[san]||'Le coup am├йliore la coordination de tes pi├иces et respecte le plan de lтАЩouverture.'}
function status(t,m,c){$('status').className='status '+c;$('status').innerHTML=`<strong>${t}</strong><span>${m}</span>`}
function hint(){hints++;const e=line[idx];if(!e)return;const sq=[...document.querySelectorAll('.sq')].find(x=>x.dataset.s===e.from);if(sq)sq.classList.add('hint');status('Indice',`Cherche un coup depuis ${e.from}. Objectif : ${explain(e.san)}`,'alt')}
function finish(){const acc=total?Math.round(first/total*100):0,gain=Math.max(20,Math.round(acc/2)-errors*2)+(boss&&lives>0?150:0);profile.xp+=gain;let msg='Progression enregistr├йe.';if(acc>=85&&hints<=1&&!boss){profile.mastery[opening.id]=Math.max(mastery(),level);msg=`Niveau ${level} valid├й.`}if(boss&&lives>0){profile.mastery[opening.id]=3;msg='Boss vaincu тАФ ouverture ma├оtris├йe.'}save();$('emoji').textContent=boss?(lives>0?'ЁЯСС':'ЁЯТФ'):(acc>=85?'ЁЯОЙ':'ЁЯУЪ');$('resTitle').textContent=boss?(lives>0?'Boss vaincu':'Boss perdu'):'Session termin├йe';$('resSub').textContent=msg;$('acc').textContent=acc+'%';$('err').textContent=errors;$('hints').textContent=hints;$('gain').textContent='+'+gain+' XP';$('resultModal').classList.add('open')}
$('color').onchange=populate;$('opening').onchange=()=>{opening=openings().find(o=>o.id===$('opening').value);populateLevels();preview()};$('level').onchange=()=>{level=Number($('level').value);preview()};$('startBtn').onclick=()=>start(false);$('bossBtn').onclick=()=>start(true);$('conceptBtn').onclick=concept;$('conceptTrain').onclick=concept;$('conceptClose').onclick=()=>$('conceptModal').classList.remove('open');$('back').onclick=()=>{show('home');populateLevels();preview()};$('restart').onclick=()=>start(boss);$('hint').onclick=hint;$('again').onclick=()=>{$('resultModal').classList.remove('open');start(boss)};$('homeBtn').onclick=()=>{$('resultModal').classList.remove('open');show('home');populateLevels();preview()};updateXP();populate();
</script>
</body></html>
