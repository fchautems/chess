name: Générer les fichiers JavaScript V7.1

on:
  pull_request:
    branches: [v71-clean]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: generate-v71-js
  cancel-in-progress: false

jobs:
  generate:
    if: github.event.pull_request.head.ref == 'v71-js-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche de travail
        uses: actions/checkout@v4
        with:
          ref: v71-clean
          fetch-depth: 0
          show-progress: false

      - name: Restaurer la source V7.1 depuis ses fragments exacts
        id: restore
        shell: bash
        run: |
          set -u
          REF=origin/refactor/v7.1-split-clean
          EXPECTED="10e266aacf6c75bc9bd91cbad800363754c1ee912abe8329b8ff32ceca570c2f"
          REPORT=/tmp/fragment-report.txt
          : > "$REPORT"
          git fetch --no-tags origin refactor/v7.1-split-clean

          prefix_parts="
          baseline/exact/v71.html.gz.b64.part01
          baseline/exact/v71.html.gz.b64.part02
          baseline/exact/v71.html.gz.b64.part03
          baseline/exact/v71.html.gz.b64.part04
          baseline/exact/v71.html.gz.b64.part05a
          baseline/exact/v71.html.gz.b64.part05b
          baseline/exact/v71.html.gz.b64.part05c
          "

          success=0
          for variant in abc eec; do
            : > /tmp/v71.b64
            for part in $prefix_parts; do
              git show "$REF:$part" >> /tmp/v71.b64
            done
            if [ "$variant" = abc ]; then
              tail_parts="baseline/exact/v71.html.gz.b64.part06a baseline/exact/v71.html.gz.b64.part06b baseline/exact/v71.html.gz.b64.part06c"
            else
              tail_parts="baseline/exact/v71.html.gz.b64.part06e1 baseline/exact/v71.html.gz.b64.part06e2 baseline/exact/v71.html.gz.b64.part06c"
            fi
            for part in $tail_parts; do
              git show "$REF:$part" >> /tmp/v71.b64
            done

            tr -d '\r\n' < /tmp/v71.b64 > /tmp/v71.clean.b64
            chars=$(wc -c < /tmp/v71.clean.b64)
            if base64 --decode /tmp/v71.clean.b64 > /tmp/v71.html.gz 2>/tmp/base64.err; then
              b64_status=ok
            else
              b64_status=failed
            fi
            if gzip -dc /tmp/v71.html.gz > /tmp/candidate.html 2>/tmp/gzip.err; then
              gzip_status=ok
            else
              gzip_status=failed
            fi
            size=$(wc -c < /tmp/candidate.html 2>/dev/null || echo 0)
            sha=$(sha256sum /tmp/candidate.html 2>/dev/null | awk '{print $1}')
            {
              echo "variant=$variant"
              echo "base64_chars=$chars"
              echo "base64_status=$b64_status"
              echo "gzip_status=$gzip_status"
              echo "decoded_size=$size"
              echo "decoded_sha256=$sha"
              echo "base64_error=$(tr '\n' ' ' < /tmp/base64.err)"
              echo "gzip_error=$(tr '\n' ' ' < /tmp/gzip.err)"
              echo
            } >> "$REPORT"

            if [ "$sha" = "$EXPECTED" ]; then
              cp /tmp/candidate.html /tmp/v71.html
              success=1
              break
            fi
          done

          cat "$REPORT"
          [ "$success" -eq 1 ]

      - name: Générer et contrôler les huit fichiers
        if: steps.restore.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/generate_v71_js.py /tmp/v71.html
          for file in js/*.js; do node --check "$file"; done

      - name: Enregistrer le résultat sur v71-clean
        if: steps.restore.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/generate-v71-js.yml tools/generate_v71_js.py FRAGMENT_DIAGNOSTIC.txt
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajoute les fichiers JavaScript restants de la V7.1"
          git push origin HEAD:v71-clean

      - name: Enregistrer le diagnostic en cas d’échec
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/fragment-report.txt FRAGMENT_DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FRAGMENT_DIAGNOSTIC.txt
          git commit -m "Enregistre le diagnostic des fragments V7.1" || true
          git push origin HEAD:v71-clean
