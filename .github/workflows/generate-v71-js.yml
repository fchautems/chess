name: Générer les fichiers JavaScript V7.1

on:
  pull_request:
    branches: [v71-clean]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: generate-v71-js
  cancel-in-progress: false

jobs:
  generate:
    if: github.event.pull_request.head.ref == 'v71-js-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche de travail
        uses: actions/checkout@v4
        with:
          ref: v71-clean
          fetch-depth: 0
          show-progress: false

      - name: Restaurer la source V7.1 depuis ses fragments exacts
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          REF=origin/refactor/v7.1-split-clean
          git fetch --no-tags origin refactor/v7.1-split-clean
          rm -rf /tmp/v71-parts
          mkdir -p /tmp/v71-parts
          for name in part01 part02 part03 part04 part05a part05b part05c part06a part06b part06c part06e1 part06e2; do
            git show "$REF:baseline/exact/v71.html.gz.b64.$name" > "/tmp/v71-parts/$name"
          done

          python3 - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib

          expected = "10e266aacf6c75bc9bd91cbad800363754c1ee912abe8329b8ff32ceca570c2f"
          alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/="
          root = Path('/tmp/v71-parts')
          common = ['part01','part02','part03','part04','part05a','part05b','part05c']
          variants = {
              'abc': common + ['part06a','part06b','part06c'],
              'eec': common + ['part06e1','part06e2','part06c'],
          }
          report = []
          found = False

          def load(name):
              return ''.join(root.joinpath(name).read_text(encoding='ascii').split())

          for variant, names in variants.items():
              parts = [load(name) for name in names]
              report.append(f"variant={variant} original_chars={sum(map(len, parts))}")
              for boundary in range(len(parts) + 1):
                  left = ''.join(parts[:boundary])
                  right = ''.join(parts[boundary:])
                  for character in alphabet:
                      encoded = left + character + right
                      try:
                          compressed = base64.b64decode(encoded, validate=True)
                          source = gzip.decompress(compressed)
                      except Exception:
                          continue
                      actual = hashlib.sha256(source).hexdigest()
                      if actual == expected:
                          Path('/tmp/v71.html').write_bytes(source)
                          report.append(
                              f"FOUND variant={variant} boundary={boundary} "
                              f"character={character!r} size={len(source)} sha256={actual}"
                          )
                          found = True
                          break
                  if found:
                      break
              if found:
                  break

          if not found:
              report.append('Aucune insertion aux jonctions ne restaure la source exacte.')
          Path('/tmp/fragment-report.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          print('\n'.join(report))
          if not found:
              raise SystemExit(1)
          PY

      - name: Générer et contrôler les huit fichiers
        if: steps.restore.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/generate_v71_js.py /tmp/v71.html
          for file in js/*.js; do node --check "$file"; done

      - name: Enregistrer le résultat sur v71-clean
        if: steps.restore.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/generate-v71-js.yml tools/generate_v71_js.py FRAGMENT_DIAGNOSTIC.txt
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajoute les fichiers JavaScript restants de la V7.1"
          git push origin HEAD:v71-clean

      - name: Enregistrer le diagnostic en cas d’échec
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/fragment-report.txt FRAGMENT_DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FRAGMENT_DIAGNOSTIC.txt
          git commit -m "Enregistre le diagnostic des jonctions V7.1" || true
          git push origin HEAD:v71-clean
