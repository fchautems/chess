name: Générer les fichiers JavaScript V7.1

on:
  pull_request:
    branches:
      - v71-clean
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: generate-v71-js
  cancel-in-progress: false

jobs:
  generate:
    if: github.event.pull_request.head.ref == 'v71-js-trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche de travail
        uses: actions/checkout@v4
        with:
          ref: v71-clean
          fetch-depth: 0

      - name: Retrouver la source V7.1 exacte dans l’historique
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="10e266aacf6c75bc9bd91cbad800363754c1ee912abe8329b8ff32ceca570c2f"
          git fetch --no-tags origin refactor/v7.1-split-clean
          git show origin/refactor/v7.1-split-clean:RECOVERABLE_V71_COMMITS.txt > /tmp/recoverable.txt

          {
            echo 31c292f1bd622fec5f27065bb5afea252b0a6cf9d
            grep '^## [0-9a-f]\{40\}$' /tmp/recoverable.txt | awk '{print $2}'
          } | awk 'NF && !seen[$0]++' > /tmp/commit-shas.txt

          : > /tmp/v71.html
          while IFS= read -r sha; do
            [ -n "$sha" ] || continue
            git fetch --quiet origin "$sha" 2>/dev/null || true
            git ls-tree -rl "$sha" 2>/dev/null \
              | awk '$4 == 480009 {print $3 "\t" $5}' > /tmp/candidates.txt || true

            while IFS=$'\t' read -r blob path; do
              [ -n "$blob" ] || continue
              git cat-file blob "$blob" > /tmp/candidate.html 2>/dev/null || continue
              actual=$(sha256sum /tmp/candidate.html | awk '{print $1}')
              if [ "$actual" = "$EXPECTED" ]; then
                cp /tmp/candidate.html /tmp/v71.html
                echo "Source exacte retrouvée : commit=$sha blob=$blob path=$path"
                break 2
              fi
            done < /tmp/candidates.txt
          done < /tmp/commit-shas.txt

          test -s /tmp/v71.html
          echo "$EXPECTED  /tmp/v71.html" | sha256sum --check

      - name: Générer et contrôler les huit fichiers
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/generate_v71_js.py /tmp/v71.html
          for file in js/*.js; do
            node --check "$file"
          done

      - name: Enregistrer le résultat sur v71-clean
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/generate-v71-js.yml tools/generate_v71_js.py
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajoute les fichiers JavaScript restants de la V7.1"
          git push origin HEAD:v71-clean
