name: Stabiliser le plateau V7.1

on:
  push:
    branches: [main]
    paths: [.v71-board-fix-trigger]

permissions:
  contents: write

jobs:
  stabilize:
    runs-on: ubuntu-latest
    steps:
      - name: Corriger la branche V7.1
        uses: actions/checkout@v4
        with:
          ref: v71-clean
          fetch-depth: 0

      - name: Verrouiller la mise en page de la branche
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q "Stabilise définitivement le plateau" css/04-training.css; then
            cat >> css/04-training.css <<'CSS'

    /* Stabilise définitivement le plateau pendant les changements de message. */
    @media (max-width: 760px) {
      .board-wrap {
        align-items: flex-start;
      }

      .status-card {
        height: 96px;
        min-height: 96px;
        max-height: 96px;
        overflow: hidden;
      }

      .status-text span {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        overflow: hidden;
        font-size: 12px;
        line-height: 1.3;
      }
    }

    @supports (width: 1cqh) {
      .board-wrap {
        container-type: size;
      }

      .board {
        width: min(100cqw, 100cqh);
        max-width: none;
      }
    }
CSS
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add css/04-training.css
          git diff --cached --quiet || git commit -m "Stabilise la position du plateau sur mobile"
          git push origin HEAD:v71-clean

      - name: Ouvrir la branche principale pour la prévisualisation
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true

      - name: Mettre à jour la prévisualisation et nettoyer
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q "Stabilise définitivement le plateau" preview-v71/css/04-training.css; then
            cat >> preview-v71/css/04-training.css <<'CSS'

    /* Stabilise définitivement le plateau pendant les changements de message. */
    @media (max-width: 760px) {
      .board-wrap {
        align-items: flex-start;
      }

      .status-card {
        height: 96px;
        min-height: 96px;
        max-height: 96px;
        overflow: hidden;
      }

      .status-text span {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        overflow: hidden;
        font-size: 12px;
        line-height: 1.3;
      }
    }

    @supports (width: 1cqh) {
      .board-wrap {
        container-type: size;
      }

      .board {
        width: min(100cqw, 100cqh);
        max-width: none;
      }
    }
CSS
          fi
          rm -f .v71-board-fix-trigger .github/workflows/stabilize-v71-board.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stabilise la prévisualisation V7.1 sur mobile"
          git push origin HEAD:main
