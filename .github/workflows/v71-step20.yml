name: V7.1 step 20

on:
  push:
    branches:
      - v71-clean
    paths:
      - .v71-step20-trigger

permissions:
  contents: write

concurrency:
  group: v71-step20
  cancel-in-progress: false

jobs:
  generate-data-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v71-clean
        uses: actions/checkout@v4
        with:
          ref: v71-clean
          fetch-depth: 0

      - name: Restore exact source and generate js/01-data.js
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin refactor/v7.1-split-clean
          git cat-file blob 4a00914d628f2e6348d930a063e3fb4861d56142 > /tmp/v71.html
          echo "10e266aacf6c75bc9bd91cbad800363754c1ee912abe8329b8ff32ceca570c2f  /tmp/v71.html" | sha256sum --check

          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re

          source = Path('/tmp/v71.html').read_text(encoding='utf-8')
          script_open = source.rfind('<script>')
          script_start = script_open + len('<script>')
          script_close = source.index('</script>', script_start)
          javascript = source[script_start:script_close]

          match = re.search(
              r'    const PIECE_IMAGES = (\{.*?\});\n',
              javascript,
              flags=re.S,
          )
          if not match:
              raise RuntimeError('PIECE_IMAGES introuvable')

          images = json.loads(match.group(1))
          first_keys = list(images)[:2]
          if first_keys != ['wp', 'wn']:
              raise RuntimeError(f'Ordre inattendu : {first_keys}')

          replacement = '    const PIECE_IMAGES = {};\n'
          for key in first_keys:
              replacement += (
                  '    Object.assign(PIECE_IMAGES, '
                  + json.dumps(
                      {key: images[key]},
                      ensure_ascii=False,
                      separators=(',', ':'),
                  )
                  + ');\n'
              )

          output = javascript[:match.start()] + replacement
          output_bytes = output.encode('utf-8')
          expected_sha = '03ddefb57a3fa8ed682a72eacf9393604d1ec7005debf50a0af1b9cd320050a4'
          actual_sha = hashlib.sha256(output_bytes).hexdigest()

          if len(output_bytes) != 61730:
              raise RuntimeError(f'Taille incorrecte : {len(output_bytes)}')
          if actual_sha != expected_sha:
              raise RuntimeError(f'SHA-256 incorrect : {actual_sha}')

          path = Path('js/01-data.js')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_bytes(output_bytes)
          print(f'{path}: {len(output_bytes)} octets, {actual_sha}')
          PY

          node --check js/01-data.js

      - name: Commit exact generated file
        shell: bash
        run: |
          set -euo pipefail
          rm -f .v71-step20-trigger .github/workflows/v71-step20.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajoute le premier fichier JavaScript de la V7.1"
          git push origin HEAD:v71-clean
