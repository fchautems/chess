name: Publier la prévisualisation V7.1

on:
  push:
    branches: [main]
    paths: [.github/workflows/publish-v71-preview.yml]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}preview-v71/
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le site actuel
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Construire la prévisualisation séparée
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin v71-clean
          rm -rf preview-v71 /tmp/site
          mkdir -p preview-v71/css preview-v71/js /tmp/site
          git show origin/v71-clean:index.html > preview-v71/index.html
          for file in 01-base.css 02-home.css 03-board.css 04-training.css 05-modals.css; do
            git show "origin/v71-clean:css/$file" > "preview-v71/css/$file"
          done
          for file in 01-data.js 02-state.js 03-board.js 04-training.js 05-campaign.js 06-boss.js 07-ui.js 08-init.js; do
            git show "origin/v71-clean:js/$file" > "preview-v71/js/$file"
            node --check "preview-v71/js/$file"
          done
          rsync -a --exclude='.git' --exclude='.github' ./ /tmp/site/
          test -f /tmp/site/index.html
          test -f /tmp/site/preview-v71/index.html

      - name: Préparer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Charger le site Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      - name: Déployer le site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Conserver uniquement le dossier de prévisualisation
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/publish-v71-preview.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add preview-v71 .github/workflows/publish-v71-preview.yml
          git commit -m 'Publie la prévisualisation séparée de la V7.1'
          git push origin HEAD:main
