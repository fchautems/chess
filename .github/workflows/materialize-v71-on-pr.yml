name: Identifier le meilleur candidat V7.1

on:
  pull_request:
    branches:
      - refactor/v7.1-split-clean

permissions:
  contents: write

jobs:
  recover:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v7.1-split-clean
          fetch-depth: 0

      - name: Chercher la source exacte ou un paquet complet
        shell: bash
        run: |
          set -u
          REPORT=V71_BEST_CANDIDATES.txt
          : > "$REPORT"
          grep '^## [0-9a-f]\{40\}$' RECOVERABLE_V71_COMMITS.txt | awk '{print $2}' > /tmp/event-shas.txt

          while IFS= read -r sha; do
            [ -n "$sha" ] || continue
            git fetch --quiet origin "$sha" 2>/dev/null || continue
            git ls-tree -rl "$sha" > /tmp/tree.txt 2>/dev/null || continue

            exact=$(grep '4a00914d628f2e6348d930a063e3fb4861d56142' /tmp/tree.txt || true)
            preview_index=$(grep -E '[[:space:]]v71-preview/index\.html$' /tmp/tree.txt || true)
            preview_css=$(grep -E '[[:space:]]v71-preview/styles\.css$' /tmp/tree.txt || true)
            preview_js=$(grep -E '[[:space:]]v71-preview/(app\.js|app-[0-9]+\.js)$' /tmp/tree.txt || true)

            if [ -n "$exact" ] || { [ -n "$preview_index" ] && [ -n "$preview_css" ] && [ -n "$preview_js" ]; }; then
              {
                echo "## $sha"
                git show -s --format='date=%cI%nmessage=%s%nparents=%P' "$sha"
                [ -z "$exact" ] || { echo 'EXACT_SOURCE:'; printf '%s\n' "$exact"; }
                if [ -n "$preview_index" ] && [ -n "$preview_css" ] && [ -n "$preview_js" ]; then
                  echo 'COMPLETE_PREVIEW:'
                  printf '%s\n%s\n%s\n' "$preview_index" "$preview_css" "$preview_js"
                fi
                echo
              } >> "$REPORT"
            fi
          done < /tmp/event-shas.txt

          if [ ! -s "$REPORT" ]; then
            echo 'Aucun candidat complet retrouvé.' > "$REPORT"
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$REPORT"
          git commit -m 'Identifie le meilleur candidat V7.1' || true
          git push origin HEAD:refactor/v7.1-split-clean
