name: Retrouver les fichiers V7.1 complets

on:
  pull_request:
    branches:
      - refactor/v7.1-split-clean

permissions:
  contents: write

jobs:
  recover:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v7.1-split-clean
          fetch-depth: 0

      - name: Inspecter les arbres complets des commits récupérables
        shell: bash
        run: |
          set -u
          REPORT=V71_COMPLETE_FILE_CANDIDATES.txt
          : > "$REPORT"
          grep '^## [0-9a-f]\{40\}$' RECOVERABLE_V71_COMMITS.txt | awk '{print $2}' > /tmp/event-shas.txt

          while IFS= read -r sha; do
            [ -n "$sha" ] || continue
            git fetch --quiet origin "$sha" 2>/dev/null || continue
            git ls-tree -rl "$sha" > /tmp/tree.txt 2>/dev/null || continue
            matches=$(grep -E '(^|[[:space:]])(baseline/entraineur_ouvertures_echecs_v7_1\.html|v71-preview/(index\.html|styles\.css|app(-[0-9]+)?\.js|vendor/chess\.min\.js)|app\.js|app-data\.js|styles\.css)$' /tmp/tree.txt || true)
            blob_match=$(grep '4a00914d628f2e6348d930a063e3fb4861d56142' /tmp/tree.txt || true)
            if [ -n "$matches$blob_match" ]; then
              {
                echo "## $sha"
                git show -s --format='date=%cI%nmessage=%s%nparents=%P' "$sha"
                echo 'matching-tree-entries:'
                printf '%s\n' "$matches"
                if [ -n "$blob_match" ]; then
                  echo 'exact-known-blob:'
                  printf '%s\n' "$blob_match"
                fi
                echo
              } >> "$REPORT"
            fi
          done < /tmp/event-shas.txt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$REPORT"
          git commit -m 'Repère les fichiers V7.1 complets récupérables' || true
          git push origin HEAD:refactor/v7.1-split-clean
