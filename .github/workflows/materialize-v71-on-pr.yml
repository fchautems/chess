name: Inventorier les fragments V7.1

on:
  pull_request:
    branches:
      - refactor/v7.1-split-clean

permissions:
  contents: write

jobs:
  inventory:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v7.1-split-clean
          fetch-depth: 0

      - name: Inventorier les fragments exacts
        shell: bash
        run: |
          set -euo pipefail
          REPORT=EXACT_PARTS_INVENTORY.txt
          {
            echo '# Inventaire des fragments Base64 V7.1'
            echo
            for file in baseline/exact/v71.html.gz.b64.part*; do
              echo "## $file"
              echo "bytes=$(wc -c < \"$file\")"
              echo "sha256=$(sha256sum \"$file\" | cut -d' ' -f1)"
              printf 'start='; head -c 64 "$file"; echo
              printf 'end='; tail -c 64 "$file"; echo
              echo
            done
          } > "$REPORT"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$REPORT"
          git commit -m 'Inventorie les fragments exacts V7.1' || true
          git push origin HEAD:refactor/v7.1-split-clean
