name: Matérialiser la V7.1 séparée

on:
  pull_request:
    branches:
      - refactor/v7.1-split-clean

permissions:
  contents: write

jobs:
  inventory:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/v7.1-split-clean
          fetch-depth: 0

      - name: Inventorier toutes les branches de migration
        shell: bash
        run: |
          set -euo pipefail
          REPORT=BRANCH_V71_INVENTORY.txt
          {
            echo '# Inventaire des branches V7.1'
            echo
            git branch -r
            echo
            for ref in \
              origin/main \
              origin/refactor/v7-modular \
              origin/refactor/v7.1-split \
              origin/refactor/v7.1-split-clean \
              origin/trigger/v71-materialize; do
              echo "## $ref"
              git log -1 --format='%H %s' "$ref"
              git ls-tree -rl "$ref" | awk '{print $4, $5}' | sort
              echo
            done
          } > "$REPORT"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$REPORT"
          git commit -m 'Inventorie les branches de migration V7.1' || true
          git push origin HEAD:refactor/v7.1-split-clean
