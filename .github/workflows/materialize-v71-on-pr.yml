name: Matérialiser la V7.1 séparée

on:
  pull_request:
    branches:
      - refactor/v7.1-split-clean

permissions:
  contents: write

concurrency:
  group: materialize-v71-clean
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche de travail
        uses: actions/checkout@v4
        with:
          ref: refactor/v7.1-split-clean
          fetch-depth: 0

      - name: Diagnostiquer et restaurer la source originale
        shell: bash
        run: |
          set +e
          mkdir -p baseline v71-preview/vendor
          SOURCE=baseline/entraineur_ouvertures_echecs_v7_1.html
          PARTS=(baseline/source/v71.html.gz.b64.part*)
          DIAG=RESTORE_DIAGNOSTIC.txt
          rm -f "$SOURCE" /tmp/v71.html.gz "$DIAG"

          {
            echo "# Diagnostic restauration V7.1"
            date -u
            echo
            echo "## Fichiers source"
            ls -la baseline/source
            echo
            for part in "${PARTS[@]}"; do
              echo "### $part"
              wc -c "$part"
              printf 'début: '; head -c 16 "$part"; echo
              printf 'fin: '; tail -c 16 "$part"; echo
            done

            echo
            echo "## Méthode 1 : concaténer puis décoder"
            cat "${PARTS[@]}" | base64 --decode > /tmp/v71.html.gz
            M1_B64=$?
            echo "base64_status=$M1_B64"
            wc -c /tmp/v71.html.gz
            gzip -t /tmp/v71.html.gz
            M1_GZIP=$?
            echo "gzip_status=$M1_GZIP"
            if [ "$M1_B64" -eq 0 ] && [ "$M1_GZIP" -eq 0 ]; then
              gzip -dc /tmp/v71.html.gz > "$SOURCE"
              echo "sha256=$(sha256sum "$SOURCE" | cut -d' ' -f1)"
            fi

            echo
            echo "## Méthode 2 : décoder chaque fragment"
            rm -f /tmp/v71.html.gz
            for part in "${PARTS[@]}"; do
              base64 --decode "$part"
              echo "fragment_status=$? file=$part" >&2
            done > /tmp/v71.html.gz
            M2_B64=$?
            echo "boucle_status=$M2_B64"
            wc -c /tmp/v71.html.gz
            gzip -t /tmp/v71.html.gz
            M2_GZIP=$?
            echo "gzip_status=$M2_GZIP"
            if [ "$M2_GZIP" -eq 0 ]; then
              gzip -dc /tmp/v71.html.gz > "$SOURCE"
              echo "sha256=$(sha256sum "$SOURCE" | cut -d' ' -f1)"
            fi
          } > "$DIAG" 2>&1

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DIAG"
          git commit -m "Enregistre le diagnostic de restauration V7.1" || true
          git push origin HEAD:refactor/v7.1-split-clean
          exit 1

      - name: Séparer mécaniquement la V7.1
        run: python3 tools/split_v71.py

      - name: Ajouter chess.js localement
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js \
            --output v71-preview/vendor/chess.min.js
          test -s v71-preview/vendor/chess.min.js

      - name: Contrôler les fichiers générés
        shell: bash
        run: |
          set -euo pipefail
          test -s v71-preview/index.html
          test -s v71-preview/styles.css
          test -s v71-preview/app.js
          test -s v71-preview/vendor/chess.min.js
          node --check v71-preview/app.js
          node --check v71-preview/vendor/chess.min.js

      - name: Enregistrer les résultats sur la branche V7.1
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add baseline/entraineur_ouvertures_echecs_v7_1.html baseline/SHA256.txt v71-preview validation-report.json VALIDATION.md
          git commit -m "Gèle et sépare mécaniquement la V7.1"
          git push origin HEAD:refactor/v7.1-split-clean
